stages:
  - test
  - build

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null
    - pip install --no-cache-dir -e '.[dev]'
  script:
    - pytest --tb=short -q

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  parallel:
    matrix:
      - AGENT: [claude, opencode]
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/$AGENT"
    - REF_TAG="$IMAGE:$CI_COMMIT_REF_SLUG"
    - docker build --pull -f "Dockerfile.$AGENT" -t "$REF_TAG" .
    - docker push "$REF_TAG"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag  "$REF_TAG" "$IMAGE:latest"
        docker push "$IMAGE:latest"
      fi
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag  "$REF_TAG" "$IMAGE:$CI_COMMIT_TAG"
        docker push "$IMAGE:$CI_COMMIT_TAG"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
